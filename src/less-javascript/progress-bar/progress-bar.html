<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scroll Progress Indicator</title>
    <meta
      name="description"
      content="Create progress bar in css that updates on scroll. CSS only, no JS"
    />
    <link rel="stylesheet" href="/src/theme.css" />
    <link rel="stylesheet" href="./progress-bar.css" />
    <script type="module" src="/src/theme.js"></script>
  </head>
  <body>
    <div class="progress"></div>
    <main>
      <back-link></back-link>

      <h1>Scroll Down to See the Magic</h1>
      <p>The green bar at the top will grow as you scroll.</p>

      <div class="content-spacer">
        <p>Keep scrolling...</p>
      </div>

      <section>
        <h2>Middle of the Page</h2>
        <p>Modern CSS allows us to do this without a single line of JavaScript!</p>
      </section>

      <div class="content-spacer"></div>

      <footer>
        <h2>The End</h2>
        <p>The bar should now be at 100% width.</p>
      </footer>
    </main>
  </body>
</html>
